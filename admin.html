<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Admin | Yaohui Huang</title>
    <link rel="stylesheet" href="stylesheets/styles.css?v=20260624-4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="./images/earth.png">
</head>
<body class="standalone-page admin-page">
    <main class="admin-shell">
        <header class="archive-header admin-header">
            <button class="icon-button theme-toggle" type="button" aria-label="Toggle dark theme" title="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <h1>Content Admin</h1>
            <p>Edit the local JSON data that powers the homepage and publications archive.</p>
        </header>

        <section class="admin-toolbar" aria-label="Editor controls">
            <div class="admin-tabs" role="tablist" aria-label="Content files">
                <button type="button" data-admin-tab="publications">Publications</button>
                <button type="button" data-admin-tab="news">News</button>
                <button type="button" data-admin-tab="projects">Projects</button>
                <button type="button" data-admin-tab="service">Service</button>
            </div>
            <div class="admin-file-actions">
                <button class="btn" type="button" id="admin-open-file">Open JSON</button>
                <button class="btn" type="button" id="admin-save-file">Save JSON</button>
                <button class="btn" type="button" id="admin-download-file">Download</button>
            </div>
            <p id="admin-status" class="admin-status" aria-live="polite"></p>
        </section>

        <section class="admin-workspace">
            <aside class="admin-list-panel" aria-label="Content items">
                <div class="admin-list-header">
                    <h2 id="admin-list-title">Publications</h2>
                    <div class="admin-item-actions">
                        <button class="btn" type="button" id="admin-new-item">New</button>
                        <button class="btn" type="button" id="admin-duplicate-item">Duplicate</button>
                        <button class="btn" type="button" id="admin-delete-item">Delete</button>
                    </div>
                </div>
                <div class="admin-order-actions">
                    <button class="btn" type="button" id="admin-move-up">Move Up</button>
                    <button class="btn" type="button" id="admin-move-down">Move Down</button>
                </div>
                <div id="admin-list" class="admin-list"></div>
            </aside>

            <section class="admin-editor-panel" aria-label="Editor">
                <form id="admin-form" class="admin-form"></form>
            </section>
        </section>
    </main>

    <script src="javascripts/site.js?v=20260624-4" defer></script>
    <script src="javascripts/admin.js?v=20260624-4" defer></script>
</body>
</html>
